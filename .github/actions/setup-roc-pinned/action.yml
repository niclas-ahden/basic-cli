name: "Setup pinned Roc"
description: >-
  Build and install the exact Roc compiler commit recorded in .roc-version.
  Used instead of roc-lang/setup-roc because the published nightlies lag roc
  main by up to a day, so a platform tracking a fresh compiler change cannot be
  built until the next nightly exists. Works on Linux, macOS and Windows.

inputs:
  zig-version:
    description: "Zig version used to build the compiler."
    required: false
    default: "0.16.0"

runs:
  using: composite
  steps:
    - name: Read pinned Roc commit
      id: pin
      shell: bash
      run: echo "sha=$(tr -d '[:space:]' < .roc-version)" >> "$GITHUB_OUTPUT"

    # A build takes 12-21 minutes depending on the runner, so cache the result.
    # The key covers the commit and the runner, and the compiler is immutable
    # for a given commit, so a hit is always safe to reuse.
    - name: Restore cached Roc
      id: cache
      uses: actions/cache@v4
      with:
        path: .roc-bin
        key: roc-${{ runner.os }}-${{ runner.arch }}-${{ steps.pin.outputs.sha }}

    # Done up front, before any step that might export environment of its own,
    # so a GITHUB_PATH write can never clobber it. The directory does not exist
    # yet at this point, which is fine: it is created before anything needs it.
    - name: Put Roc on PATH
      shell: bash
      run: echo "$GITHUB_WORKSPACE/.roc-bin" >> "$GITHUB_PATH"

    - name: Checkout roc-lang/roc at the pinned commit
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/checkout@v7
      with:
        repository: roc-lang/roc
        ref: ${{ steps.pin.outputs.sha }}
        path: .roc-src

    - name: Install Zig
      if: steps.cache.outputs.cache-hit != 'true'
      uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f
      with:
        version: ${{ inputs.zig-version }}
        use-cache: true

    # Deliberately NOT setting up the MSVC developer environment here. Should
    # work without it?

    # Mirrors the workaround in roc-lang/nightlies: a stray llvm-config on the
    # arm64 Linux images gets picked up and breaks the build.
    - name: Remove conflicting llvm-config
      if: steps.cache.outputs.cache-hit != 'true' && runner.os == 'Linux' && runner.arch == 'ARM64'
      shell: bash
      run: sudo rm -f /usr/lib/llvm-18/bin/llvm-config

    # Fetching the Zig dependency tarballs is flaky enough that roc-lang/roc
    # wraps this same command in a retry action, so retry here too.
    - name: Build Roc
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: .roc-src
      run: |
        set -euo pipefail
        for attempt in 1 2 3; do
          if zig build build-release; then
            exit 0
          fi
          echo "Roc build attempt $attempt failed"
          sleep 15
        done
        echo "Roc build failed after 3 attempts" >&2
        exit 1

    # Lay the binary out the way the published nightlies do. On macOS the
    # compiler looks for a 'darwin' sysroot directory next to the executable
    # and only falls back to a compile-time path, which would not exist on a
    # later cache hit, so the sysroot has to be cached alongside the binary.
    - name: Assemble Roc directory
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p .roc-bin
        cp .roc-src/zig-out/bin/roc* .roc-bin/
        if [ "$RUNNER_OS" = "macOS" ]; then
          cp -r .roc-src/src/cli/darwin .roc-bin/
        fi
        # The compiler checkout contains its own .roc sources and would
        # otherwise sit inside this repo's workspace, where the build and test
        # scripts run. Drop it once the binary has been extracted.
        rm -rf .roc-src

    - name: Show Roc version
      shell: bash
      run: roc --version
