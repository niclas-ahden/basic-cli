name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate sources
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f # ratchet:mlugg/setup-zig@v2.0.5
        with:
          version: 0.16.0
      - uses: roc-lang/setup-roc@cbe782d6f165b89c87d99f50a59ac4f5f73b4427 # ratchet:roc-lang/setup-roc@v0.3.0
        with:
          version: nightly-new-compiler
      - uses: dtolnay/rust-toolchain@1.82.0
        with:
          targets: x86_64-unknown-linux-musl
      - name: Format, check, and test examples
        run: python3 scripts/test.py --operation validate

  build-examples:
    name: build examples (${{ matrix.target }})
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x64mac
            os: macos-15
            rust_target: x86_64-apple-darwin
          - target: arm64mac
            os: macos-15
            rust_target: aarch64-apple-darwin
          - target: x64musl
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-musl
          - target: arm64musl
            os: ubuntu-22.04
            rust_target: aarch64-unknown-linux-musl
          - target: x64win
            os: windows-2025
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        if: runner.os != 'Windows'
        uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f # ratchet:mlugg/setup-zig@v2.0.5
        with:
          version: 0.16.0
      - uses: roc-lang/setup-roc@cbe782d6f165b89c87d99f50a59ac4f5f73b4427 # ratchet:roc-lang/setup-roc@v0.3.0
        with:
          version: nightly-new-compiler
      - uses: dtolnay/rust-toolchain@1.82.0
        with:
          targets: ${{ matrix.rust_target }}
      - name: Cross-compile every example
        shell: bash
        run: python3 scripts/test.py --operation build --target "${{ matrix.target }}" --artifact-dir dist/example-binaries
      - name: Upload example binaries
        uses: actions/upload-artifact@v4
        with:
          name: basic-cli-example-binaries-${{ matrix.target }}
          path: dist/example-binaries/${{ matrix.target }}
          if-no-files-found: error

  run-examples:
    name: run examples (${{ matrix.target }})
    needs: build-examples
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x64mac
            os: macos-15-intel
          - target: arm64mac
            os: macos-15
          - target: x64musl
            os: ubuntu-22.04
          - target: x64win
            os: windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.82.0
      - name: Download native example binaries
        uses: actions/download-artifact@v4
        with:
          name: basic-cli-example-binaries-${{ matrix.target }}
          path: dist/example-binaries/${{ matrix.target }}
      - name: Run native spec cases
        shell: bash
        run: python3 scripts/test.py --operation run --target "${{ matrix.target }}" --artifact-dir dist/example-binaries
