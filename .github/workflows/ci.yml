name: CI

on:
  pull_request:
  workflow_dispatch:

# this cancels workflows currently in progress if you start a new one
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15        # Apple Silicon
          - macos-15-intel  # Intel Mac
          - ubuntu-22.04    # Linux x86_64
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f # ratchet:mlugg/setup-zig@v2.0.5
        with:
          version: 0.16.0

      - name: Install Roc nightly
        uses: roc-lang/setup-roc@cbe782d6f165b89c87d99f50a59ac4f5f73b4427 # ratchet:roc-lang/setup-roc@v0.3.0
        with:
          version: nightly-new-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.82.0
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install expect (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu-')
        run: sudo apt-get install -y expect

      - name: Install expect (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: brew install expect

      - name: Run all tests
        uses: roc-lang/roc/.github/actions/flaky-retry@main
        with:
          command: ./ci/all_tests.sh
          error_string_contains: "error: (unable|invalid HTTP response)|HttpConnectionClosing"

  build-and-test-windows:
    name: test (windows-2025)
    runs-on: windows-2025
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Roc nightly
        uses: roc-lang/setup-roc@cbe782d6f165b89c87d99f50a59ac4f5f73b4427
        with:
          version: nightly-new-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.82.0
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build and test Windows platform
        shell: pwsh
        run: ./ci/windows_tests.ps1
