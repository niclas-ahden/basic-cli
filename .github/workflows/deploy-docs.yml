name: Deploy docs to Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
      - "platform/**"
      - "scripts/restore_release_docs.sh"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Roc
        uses: roc-lang/setup-roc@bd311e2fb815a3d2255f7ee14a922f0b736e020b
        with:
          version: nightly-new-compiler

      - name: Restore released docs
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/restore_release_docs.sh temp_docs

      - name: Generate main branch docs
        env:
          ROC_DOCS_URL_ROOT: /basic-cli/main
        run: |
          set -euo pipefail

          roc docs --output=temp_docs/main platform/main.roc

      - name: Fix legacy generated URLs
        run: |
          find temp_docs -type f \( -name "*.html" -o -name "*.js" \) \
            -exec sed -i 's|/packages/basic-cli/|/basic-cli/|g' {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: temp_docs

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
