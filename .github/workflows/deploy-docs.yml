name: Deploy docs to Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
      - "platform/**"
      - "www/**"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Roc
        uses: roc-lang/setup-roc@bd311e2fb815a3d2255f7ee14a922f0b736e020b
        with:
          version: nightly-new-compiler

      - name: Create Pages tree
        run: |
          mkdir -p temp_docs
          if [ -d www ]; then
            cp -R www/. temp_docs/
          else
            sed 's/LATESTVERSION/main/g' docs/index.html > temp_docs/index.html
          fi

      - name: Generate main branch docs
        env:
          ROC_DOCS_URL_ROOT: /basic-cli/main
        run: |
          set -euo pipefail

          # TODO: use platform/main.roc when roc-lang/roc#10002 is fixed.
          roc docs --output=temp_docs/main docs/basic-cli.roc

      - name: Fix legacy generated URLs
        run: |
          find temp_docs -type f \( -name "*.html" -o -name "*.js" \) \
            -exec sed -i 's|/packages/basic-cli/|/basic-cli/|g' {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: temp_docs

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
